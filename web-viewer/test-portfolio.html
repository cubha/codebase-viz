const rendered = [false,false,false];
const ST = [{s:1,x:0,y:0},{s:1,x:0,y:0},{s:1,x:0,y:0}];

async function renderTab(idx) {
  if(rendered[idx]) return;
  rendered[idx]=true;
  const inner = document.getElementById('i'+idx);
  try {
    const {svg} = await mermaid.render('svg'+idx+'_'+Date.now(), diagrams[idx]);
    inner.innerHTML = svg;
    const svgEl = inner.querySelector('svg');
    if(svgEl){svgEl.style.maxWidth='none';}
    fitToView(idx);
  } catch(e) {
    inner.innerHTML='<pre style="color:#fb923c;padding:20px">Error: '+e.message+'</pre>';
  }
}

function fitToView(idx) {
  const wrap = document.getElementById('w'+idx);
  const inner = document.getElementById('i'+idx);
  const svg = inner.querySelector('svg');
  if(!svg) return;
  const wW=wrap.clientWidth, wH=wrap.clientHeight;
  const sW=svg.getBBox?.()?.width||svg.clientWidth||800;
  const sH=svg.getBBox?.()?.height||svg.clientHeight||600;
  const s=Math.min(wW*0.9/sW, wH*0.9/sH, 1.2);
  ST[idx]={s,x:0,y:0};
  applyTransform(idx);
}

function applyTransform(idx) {
  const {s,x,y} = ST[idx];
  document.getElementById('i'+idx).style.transform=`translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${s})`;
}

function zoom(idx,factor) {
  ST[idx].s=Math.max(0.1, Math.min(5, ST[idx].s*factor));
  applyTransform(idx);
}

function reset(idx) { fitToView(idx); }

// Drag pan
let drag=null;
document.querySelectorAll('.diagram-wrap').forEach((wrap,idx)=>{
  wrap.addEventListener('mousedown',e=>{drag={idx,sx:e.clientX-ST[idx].x,sy:e.clientY-ST[idx].y};wrap.classList.add('dragging')});
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    zoom(idx, e.deltaY<0?1.1:1/1.1);
  },{passive:false});
});
document.addEventListener('mousemove',e=>{
  if(!drag) return;
  ST[drag.idx].x=e.clientX-drag.sx;
  ST[drag.idx].y=e.clientY-drag.sy;
  applyTransform(drag.idx);
});
document.addEventListener('mouseup',()=>{
  if(drag) document.getElementById('w'+drag.idx).classList.remove('dragging');
  drag=null;
});

async function show(idx) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  await renderTab(idx);
}

renderTab(0);
